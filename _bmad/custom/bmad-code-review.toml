# Team override for bmad-code-review — présentation claire en français pour Guillaume.
# Merges over .agents/skills/bmad-code-review/customize.toml (persistent_facts append).

[workflow]

activation_steps_prepend = [
  "Charger et appliquer le contrat de présentation : file:{project-root}/_bmad/custom/code-review-presentation-fr.md et file:{project-root}/.cursor/rules/code-review-communication.mdc. Toute sortie utilisateur de cette revue doit respecter ces deux documents.",
]

persistent_facts = [
  "file:{project-root}/_bmad/custom/code-review-presentation-fr.md",
  "file:{project-root}/.cursor/rules/code-review-communication.mdc",
  "Langue utilisateur : toujours le français pour Guillaume dans bmad-code-review — jamais répondre en anglais, même si les sous-agents ou le diff sont en anglais.",
  "Ton : phrases complètes, langage naturel — interdit le style télégraphique, les listes de mots-clés, et le jargon anglais non expliqué.",
  "Structure obligatoire avant le détail : En bref (1 phrase) puis Verdict (comptes décisions / corrections / à reporter).",
  "Pour chaque constat : Ce qui est en jeu, Le problème, Ce qu'il faut faire, Si on ne fait rien.",
  "Pour CHAQUE décision à prendre : section Recommandation BMad obligatoire (option recommandée + pourquoi en 2–4 phrases + confiance ferme ou nuancée). Guillaume ne doit jamais avoir à redemander la recommandation.",
  "Reformuler tout output sous-agent (anglais, JSON, noms de couches) en français clair avant présentation.",
]
