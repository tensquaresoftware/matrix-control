# Team override for bmad-create-story — barème de clarté pour Guillaume.
# Merges over .agents/skills/bmad-create-story/customize.toml (persistent_facts append).

[workflow]

activation_steps_prepend = [
  "Charger et appliquer d’abord file:{project-root}/_bmad/custom/clarity-bar-fr.md et file:{project-root}/.cursor/rules/bmad-clarity-bar.mdc (phrase-test non négociable sur TOUTE explication, question et décision), puis file:{project-root}/_bmad/custom/create-story-presentation-fr.md, file:{project-root}/.cursor/rules/create-story-communication.mdc et file:{project-root}/.cursor/rules/bmad-story-context-amorce.mdc. Guillaume ne doit jamais avoir à demander une reformulation pour comprendre.",
  "HARD GATE amorce : après rename_chat (une seule fois si le titre ne commence pas déjà par « BMad — », rule bmad-agent-chat-titles) le PREMIER contenu visible pour Guillaume DOIT être « ## Contexte de la Story » + UNE phrase synthétique en français clair (sans jargon excessif) sur la story à créer. Interdit d’ouvrir par un salut, En bref, ou des questions avant ce bloc. Si « Contexte de la Story » est déjà apparu plus tôt dans cette conversation, ne pas le répéter. Ensuite seulement : suite du workflow.",
]

persistent_facts = [
  "file:{project-root}/_bmad/custom/clarity-bar-fr.md",
  "file:{project-root}/.cursor/rules/bmad-clarity-bar.mdc",
  "file:{project-root}/_bmad/custom/create-story-presentation-fr.md",
  "file:{project-root}/.cursor/rules/create-story-communication.mdc",
  "file:{project-root}/.cursor/rules/bmad-story-context-amorce.mdc",
  "Amorce create-story : premier message = ## Contexte de la Story + une phrase claire ; ne pas répéter aux tours suivants.",
  "Rename-once : si le titre Agents commence déjà par « BMad — », ne jamais rappeler rename_chat.",
  "HARD GATE clarté : toute explication, question ou décision doit passer la phrase-test « Reformule en langage naturel, sans jargon excessif » AVANT envoi. Intention produit d’abord ; preuves techniques en bas ; options en verbes du quotidien ; Recommandation BMad obligatoire et aussi claire.",
  "Phrase-test avant envoi : si Guillaume dirait « Reformule en langage naturel, sans jargon excessif », réécrire.",
  "Langue : toujours le français dans le chat — le fichier story reste en anglais (document_output_language).",
  "Ton : phrases complètes, langage naturel — interdit style télégraphique et jargon non expliqué.",
  "Messages importants : En bref puis détail accessible. Exception : le tout premier message d’activation commence par Contexte de la Story.",
  "Pour CHAQUE décision à options : Recommandation BMad obligatoire (option + pourquoi + confiance).",
  "Ne pas coller d’extraits denses de la story dans le chat sans reformulation.",
]
