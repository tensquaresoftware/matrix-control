# Team override for bmad-dev-story — barème de clarté pour Guillaume.
# Merges over .agents/skills/bmad-dev-story/customize.toml (persistent_facts append).

[workflow]

activation_steps_prepend = [
  "Charger et appliquer d’abord file:{project-root}/_bmad/custom/clarity-bar-fr.md (phrase-test non négociable), puis file:{project-root}/_bmad/custom/dev-story-presentation-fr.md et file:{project-root}/.cursor/rules/dev-story-communication.mdc. Toute sortie chat doit déjà passer « Reformule en langage naturel, sans jargon excessif » sans que Guillaume le demande.",
]

persistent_facts = [
  "file:{project-root}/_bmad/custom/clarity-bar-fr.md",
  "file:{project-root}/_bmad/custom/dev-story-presentation-fr.md",
  "file:{project-root}/.cursor/rules/dev-story-communication.mdc",
  "Phrase-test avant envoi : si Guillaume dirait « Reformule en langage naturel, sans jargon excessif », réécrire.",
  "Langue : toujours le français dans le chat — mises à jour du fichier story en anglais dans le fichier.",
  "Ton : phrases complètes, langage naturel — interdit style télégraphique, logs bruts non reformulés, jargon non expliqué.",
  "Messages importants : En bref puis détail accessible (intention produit avant liste de fichiers).",
  "Pour CHAQUE décision ou blocage à options : Recommandation BMad obligatoire (option + pourquoi + confiance).",
  "À la completion : résumé produit clair + suite proposée avec recommandation (souvent code-review).",
]
