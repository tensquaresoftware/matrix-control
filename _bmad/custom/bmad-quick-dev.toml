# Team override for bmad-quick-dev — barème de clarté durci pour Guillaume.
# Merges over .agents/skills/bmad-quick-dev/customize.toml (persistent_facts append).

[workflow]

activation_steps_prepend = [
  "Charger et appliquer d’abord file:{project-root}/_bmad/custom/clarity-bar-fr.md (phrase-test non négociable), puis file:{project-root}/_bmad/custom/quick-dev-presentation-fr.md et file:{project-root}/.cursor/rules/quick-dev-communication.mdc. Toute sortie utilisateur — surtout la revue interne — doit déjà passer la phrase-test « Reformule en langage naturel, sans jargon excessif » sans que Guillaume le demande.",
  "Après rename_chat (règle bmad-agent-chat-titles) et la mise en place de Quick Dev : le premier contenu visible pour Guillaume DOIT être le titre « Contexte de la Story », suivi d’UNE phrase synthétique en français clair (sans jargon excessif) qui récapitule en quoi consiste la story à traiter (ou la demande libre s’il n’y a pas d’ID de story). Pas de détails d’implémentation ici. Ensuite seulement : enchaîner le reste (accueil, clarify/route, etc.).",
]

persistent_facts = [
  "file:{project-root}/_bmad/custom/clarity-bar-fr.md",
  "file:{project-root}/_bmad/custom/quick-dev-presentation-fr.md",
  "file:{project-root}/.cursor/rules/quick-dev-communication.mdc",
  "Amorce Quick Dev : après rename_chat, premier message = titre « Contexte de la Story » + une phrase synthétique en français clair sur l’objet de la story (sans plonger dans les détails), puis le reste du workflow.",
  "Phrase-test avant envoi : si Guillaume dirait « Reformule en langage naturel, sans jargon excessif », réécrire. Il ne doit jamais avoir à le demander.",
  "Langue utilisateur : toujours le français pour Guillaume dans bmad-quick-dev — jamais répondre en anglais dans le chat, même si les sous-agents, la spec ou le code sont en anglais.",
  "Artifacts (spec, code map, etc.) : rester en anglais (document_output_language), sauf demande contraire de Guillaume. Le chat reste en français.",
  "Ton : phrases complètes, langage naturel — interdit le style télégraphique, les listes de mots-clés, et le jargon anglais non expliqué.",
  "Messages importants : commencer par En bref (1 phrase), puis le détail en français accessible. Exception : le tout premier message d’activation commence par « Contexte de la Story » (voir amorce), pas par En bref.",
  "Revue interne Quick Dev : même exigence de clarté que bmad-code-review (En bref → Verdict → constats structurés → Recommandation BMad).",
  "Pour CHAQUE décision à options (périmètre, approche, route, branche, suite, points de revue) : section Recommandation BMad obligatoire (option recommandée + pourquoi en 2–4 phrases + confiance ferme ou nuancée). Guillaume ne doit jamais avoir à redemander la recommandation.",
  "Reformuler tout output sous-agent ou jargon de workflow (draft, oneshot, AC, etc.) en français clair avant présentation.",
]
